name: TypeYAML
description: Validate, lint, and format TypeYAML files in GitHub Actions.
inputs:
  format-check:
    description: Run taml fmt --check for changed files.
    required: false
    default: 'true'
runs:
  using: composite
  steps:
    - uses: dtolnay/rust-toolchain@stable
    - shell: bash
      run: |
        cd "$GITHUB_ACTION_PATH/.."
        cargo build --release -p taml
        mkdir -p "$RUNNER_TEMP/typeyaml/bin"
        # Copy the binary (taml on Unix, taml.exe on Windows)
        if [ "$RUNNER_OS" = "Windows" ]; then
          cp target/release/taml.exe "$RUNNER_TEMP/typeyaml/bin/"
        else
          cp target/release/taml "$RUNNER_TEMP/typeyaml/bin/"
        fi
        echo "$RUNNER_TEMP/typeyaml/bin" >> "$GITHUB_PATH"
    - shell: bash
      run: |
        files=$(git ls-files '*.taml')
        [ -z "$files" ] && exit 0
        for file in $files; do
          taml check "$file"
          taml lint "$file"
          if [ "${{ inputs.format-check }}" = "true" ]; then taml fmt "$file" --check; fi
        done
