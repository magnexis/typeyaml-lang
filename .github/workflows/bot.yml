name: TypeYAML PR Quality Gate

on:
  pull_request:
    paths: ['**/*.taml']

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: ./action
        with: { format-check: 'true' }
      - if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🦣 TypeYAML validation failed. Run `taml check`, `taml lint`, and `taml fmt --check` locally to see the diagnostics.'
            })
