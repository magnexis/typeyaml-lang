name: Native Cross-Platform Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  native:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p taml-core
      - run: cargo build --release -p taml
      - run: cargo build -p taml-lsp
